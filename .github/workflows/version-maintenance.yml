name: Version Maintenance

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run version maintenance
        id: maintenance
        run: python .github/scripts/version-maintenance.py

      - name: Create Pull Request
        if: steps.maintenance.outputs.changes_made == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="automated/version-maintenance"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "Automated post-servicing version updates"
          git push --force origin "$BRANCH"

          # Create PR only if one doesn't already exist for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "[Automated] Post-servicing version updates" \
              --body "This PR was automatically generated by the version maintenance workflow.

          Changes may include:
          - Updated PackageValidationBaselineVersion to latest NuGet versions
          - Reset IsPackable to false
          - Incremented VersionPrefix patch versions
          - Incremented AssemblyVersion third digits (excluding NO-INCREMENT lines)" \
              --base main \
              --head "$BRANCH"
          fi
